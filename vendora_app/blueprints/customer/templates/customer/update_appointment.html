{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

    <h2 class="text-xl font-semibold mb-4">
        Reschedule Appointment
    </h2>

    <form method="POST">

        <label>Date</label>
        <input type="date" name="date" required class="w-full border p-2 rounded mb-4">

        <label>Time</label>
        <input type="time" name="time" required class="w-full border p-2 rounded mb-4">

        <button class="w-full bg-blue-600 text-white py-2 rounded">
            Update
        </button>

    </form>

</div>
{% endblock %}
