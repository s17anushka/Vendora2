<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis — DistilBERT</title>
    <meta name="description" content="Analyze service review sentiment using a fine-tuned DistilBERT model. Real-time positive, neutral, and negative classification.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555568;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --positive: #00b894;
            --positive-bg: rgba(0, 184, 148, 0.1);
            --positive-border: rgba(0, 184, 148, 0.3);
            --neutral: #fdcb6e;
            --neutral-bg: rgba(253, 203, 110, 0.1);
            --neutral-border: rgba(253, 203, 110, 0.3);
            --negative: #e17055;
            --negative-bg: rgba(225, 112, 85, 0.1);
            --negative-border: rgba(225, 112, 85, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated Background ── */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(108, 92, 231, 0.08), transparent),
                radial-gradient(ellipse 500px 350px at 80% 70%, rgba(0, 184, 148, 0.06), transparent);
        }

        .container {
            position: relative; z-index: 1;
            max-width: 760px; margin: 0 auto;
            padding: 48px 24px 80px;
        }

        /* ── Header ── */
        header { text-align: center; margin-bottom: 48px; }

        .logo {
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 13px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 20px;
            background: rgba(108, 92, 231, 0.1);
            padding: 8px 18px; border-radius: 100px;
            border: 1px solid rgba(108, 92, 231, 0.2);
        }
        .logo .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        h1 {
            font-size: 42px; font-weight: 800;
            letter-spacing: -1.5px; line-height: 1.15;
            background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 16px; color: var(--text-secondary);
            margin-top: 12px; line-height: 1.6;
        }
        .subtitle strong { color: var(--text-primary); font-weight: 600; }

        /* ── Input Card ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: border-color 0.3s ease;
        }
        .card:focus-within {
            border-color: rgba(108, 92, 231, 0.3);
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.05);
        }

        .input-label {
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 14px; display: block;
        }

        textarea {
            width: 100%; min-height: 120px; max-height: 300px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif; font-size: 15px;
            padding: 16px; resize: vertical; line-height: 1.6;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        textarea::placeholder { color: var(--text-muted); }

        .input-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 16px;
        }
        .char-count { font-size: 12px; color: var(--text-muted); }

        /* ── Button ── */
        .btn-analyze {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border: none; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
            color: #fff; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
        }
        .btn-analyze:active { transform: translateY(0); }
        .btn-analyze:disabled {
            opacity: 0.5; cursor: not-allowed; transform: none;
        }
        .btn-analyze .spinner {
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.6s linear infinite; display: none;
        }
        .btn-analyze.loading .spinner { display: inline-block; }
        .btn-analyze.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Result Card ── */
        .result-section { margin-top: 28px; display: none; }
        .result-section.visible { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            backdrop-filter: blur(20px);
        }

        .sentiment-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 22px; border-radius: 100px;
            font-size: 16px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sentiment-badge.positive {
            color: var(--positive); background: var(--positive-bg);
            border: 1px solid var(--positive-border);
        }
        .sentiment-badge.neutral {
            color: var(--neutral); background: var(--neutral-bg);
            border: 1px solid var(--neutral-border);
        }
        .sentiment-badge.negative {
            color: var(--negative); background: var(--negative-bg);
            border: 1px solid var(--negative-border);
        }

        .sentiment-emoji { font-size: 20px; }

        /* ── Confidence Bar ── */
        .confidence-section { margin-top: 24px; }
        .confidence-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .confidence-label {
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
        }
        .confidence-value {
            font-size: 22px; font-weight: 700; color: var(--text-primary);
        }
        .confidence-bar-bg {
            height: 8px; background: rgba(255,255,255,0.06);
            border-radius: 100px; overflow: hidden;
        }
        .confidence-bar-fill {
            height: 100%; border-radius: 100px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0;
        }
        .confidence-bar-fill.positive { background: linear-gradient(90deg, #00b894, #55efc4); }
        .confidence-bar-fill.neutral { background: linear-gradient(90deg, #fdcb6e, #ffeaa7); }
        .confidence-bar-fill.negative { background: linear-gradient(90deg, #e17055, #fab1a0); }

        /* ── Meta Info ── */
        .meta-row {
            display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap;
        }
        .meta-chip {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text-muted);
            background: rgba(255,255,255,0.03);
            padding: 6px 14px; border-radius: 100px;
            border: 1px solid var(--border);
        }

        /* ── Example Chips ── */
        .examples-section { margin-top: 28px; }
        .examples-label {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        .examples-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .example-chip {
            font-size: 13px; color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 100px;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .example-chip:hover {
            color: var(--text-primary);
            border-color: rgba(108, 92, 231, 0.4);
            background: rgba(108, 92, 231, 0.08);
        }

        /* ── History ── */
        .history-section { margin-top: 40px; display: none; }
        .history-section.visible { display: block; }
        .history-title {
            font-size: 13px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            cursor: pointer; transition: all 0.2s;
        }
        .history-item:hover { border-color: rgba(108, 92, 231, 0.3); }
        .history-text {
            font-size: 13px; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 400px;
        }
        .history-badge {
            font-size: 11px; font-weight: 600; padding: 4px 12px;
            border-radius: 100px; text-transform: uppercase;
        }
        .history-badge.positive { color: var(--positive); background: var(--positive-bg); }
        .history-badge.neutral { color: var(--neutral); background: var(--neutral-bg); }
        .history-badge.negative { color: var(--negative); background: var(--negative-bg); }

        /* ── Footer ── */
        footer {
            text-align: center; margin-top: 60px;
            font-size: 12px; color: var(--text-muted);
        }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Error ── */
        .error-msg {
            margin-top: 16px; padding: 14px 18px;
            background: var(--negative-bg); border: 1px solid var(--negative-border);
            border-radius: var(--radius-sm); color: var(--negative);
            font-size: 13px; display: none;
        }
        .error-msg.visible { display: block; animation: slideUp 0.3s ease; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            h1 { font-size: 28px; }
            .container { padding: 32px 16px 60px; }
            .card, .result-card { padding: 20px; }
            .history-text { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <div class="dot"></div>
                DistilBERT Sentiment
            </div>
            <h1>Service Review<br>Sentiment Analyzer</h1>
            <p class="subtitle">
                Powered by a fine-tuned <strong>DistilBERT</strong> model trained on
                service reviews. Classifies text as positive, neutral, or negative.
            </p>
        </header>

        <!-- Input -->
        <div class="card" id="input-card">
            <label class="input-label" for="review-input">Enter your review</label>
            <textarea
                id="review-input"
                placeholder="e.g. The plumber was very professional and fixed the issue quickly..."
                maxlength="1000"
            ></textarea>
            <div class="input-footer">
                <span class="char-count" id="char-count">0 / 1000</span>
                <button class="btn-analyze" id="analyze-btn" onclick="analyzeReview()">
                    <span class="btn-text">✨ Analyze Sentiment</span>
                    <div class="spinner"></div>
                </button>
            </div>
            <div class="error-msg" id="error-msg"></div>
        </div>

        <!-- Examples -->
        <div class="examples-section">
            <div class="examples-label">Try an example</div>
            <div class="examples-grid" id="examples-grid"></div>
        </div>

        <!-- Result -->
        <div class="result-section" id="result-section">
            <div class="result-card">
                <div class="sentiment-badge" id="sentiment-badge">
                    <span class="sentiment-emoji" id="sentiment-emoji"></span>
                    <span id="sentiment-text"></span>
                </div>
                <div class="confidence-section">
                    <div class="confidence-header">
                        <span class="confidence-label">Model Confidence</span>
                        <span class="confidence-value" id="confidence-value">0%</span>
                    </div>
                    <div class="confidence-bar-bg">
                        <div class="confidence-bar-fill" id="confidence-bar"></div>
                    </div>
                </div>
                <div class="meta-row" id="meta-row"></div>
            </div>
        </div>

        <!-- History -->
        <div class="history-section" id="history-section">
            <div class="history-title">📋 Recent Analyses</div>
            <div class="history-list" id="history-list"></div>
        </div>

        <footer>
            Built with <a href="https://fastapi.tiangolo.com" target="_blank">FastAPI</a>
            &amp; <a href="https://huggingface.co" target="_blank">Hugging Face Transformers</a>
            &nbsp;·&nbsp;
            <a href="/docs" target="_blank">API Docs</a>
        </footer>
    </div>

    <script>
        // ── Examples ──
        const EXAMPLES = [
            "The plumber was very professional and on time",
            "Very bad experience with the electrician",
            "Salon service was okay, nothing special",
            "Highly recommend this cleaning service",
            "Waste of money, very disappointed",
            "The mechanic did a decent job",
        ];

        const EMOJI_MAP = { positive: "😊", neutral: "😐", negative: "😞" };
        const history = [];

        // Render example chips
        const grid = document.getElementById("examples-grid");
        EXAMPLES.forEach(text => {
            const chip = document.createElement("button");
            chip.className = "example-chip";
            chip.textContent = text;
            chip.onclick = () => {
                document.getElementById("review-input").value = text;
                updateCharCount();
                analyzeReview();
            };
            grid.appendChild(chip);
        });

        // Char counter
        const textarea = document.getElementById("review-input");
        const charCount = document.getElementById("char-count");
        textarea.addEventListener("input", updateCharCount);
        function updateCharCount() {
            charCount.textContent = `${textarea.value.length} / 1000`;
        }

        // Enter to submit (Ctrl+Enter)
        textarea.addEventListener("keydown", e => {
            if (e.ctrlKey && e.key === "Enter") analyzeReview();
        });

        // ── Analyze ──
        async function analyzeReview() {
            const text = textarea.value.trim();
            const btn = document.getElementById("analyze-btn");
            const errorEl = document.getElementById("error-msg");

            errorEl.classList.remove("visible");

            if (!text) {
                errorEl.textContent = "Please enter a review to analyze.";
                errorEl.classList.add("visible");
                return;
            }

            btn.classList.add("loading");
            btn.disabled = true;

            try {
                const res = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Request failed");
                }

                const data = await res.json();
                showResult(data);
                addToHistory(data);
            } catch (err) {
                errorEl.textContent = `Error: ${err.message}`;
                errorEl.classList.add("visible");
            } finally {
                btn.classList.remove("loading");
                btn.disabled = false;
            }
        }

        // ── Show Result ──
        function showResult(data) {
            const section = document.getElementById("result-section");
            const badge = document.getElementById("sentiment-badge");
            const emoji = document.getElementById("sentiment-emoji");
            const sentText = document.getElementById("sentiment-text");
            const confValue = document.getElementById("confidence-value");
            const confBar = document.getElementById("confidence-bar");
            const metaRow = document.getElementById("meta-row");

            const s = data.sentiment;
            const pct = Math.round(data.confidence * 100);

            badge.className = `sentiment-badge ${s}`;
            emoji.textContent = EMOJI_MAP[s] || "🤔";
            sentText.textContent = s;
            confValue.textContent = `${pct}%`;

            confBar.className = `confidence-bar-fill ${s}`;
            confBar.style.width = "0";
            requestAnimationFrame(() => {
                requestAnimationFrame(() => { confBar.style.width = `${pct}%`; });
            });

            metaRow.innerHTML = `
                <div class="meta-chip">🏷️ Raw: ${data.raw_label}</div>
                <div class="meta-chip">📊 Score: ${data.confidence}</div>
                ${data.latency_ms ? `<div class="meta-chip">⚡ ${data.latency_ms}ms</div>` : ""}
            `;

            section.classList.remove("visible");
            void section.offsetWidth; // reflow
            section.classList.add("visible");
        }

        // ── History ──
        function addToHistory(data) {
            history.unshift(data);
            if (history.length > 10) history.pop();

            const section = document.getElementById("history-section");
            const list = document.getElementById("history-list");
            section.classList.add("visible");

            list.innerHTML = history.map(h => `
                <div class="history-item" onclick="document.getElementById('review-input').value='${h.text.replace(/'/g, "\\'")}'; updateCharCount();">
                    <span class="history-text">${h.text}</span>
                    <span class="history-badge ${h.sentiment}">${h.sentiment}</span>
                </div>
            `).join("");
        }
    </script>
</body>
</html>
